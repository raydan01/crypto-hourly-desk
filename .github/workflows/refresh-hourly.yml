name: Refresh hourly market snapshot

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh Kraken public snapshot
        run: python refresh_hourly.py
      - name: Commit changed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-opportunities-hourly-latest.json
          git diff --cached --quiet || git commit -m "Refresh hourly market snapshot"
          git push
