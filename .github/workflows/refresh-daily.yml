name: Refresh weekly trading snapshot

on:
  schedule:
    - cron: "31 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh Kraken public daily snapshot
        run: python refresh_daily.py
      - name: Commit changed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-opportunities-daily-latest.json data/market-opportunities-long-term-latest.json
          git diff --cached --quiet || git commit -m "Refresh weekly trading snapshot"
          git push
